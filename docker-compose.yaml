# docker-compose.yml
services:
  postgres:
    image: postgres:17-alpine
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: cloudnest
      POSTGRES_PASSWORD: cloudnest
      POSTGRES_DB: cloudnest
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U cloudnest"], interval: 5s }

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: [redisdata:/data]

  minio:                       # S3-compatible local storage
    image: minio/minio
    command: server /data --console-address ":9001"
    ports: ["9000:9000", "9001:9001"]
    environment:
      MINIO_ROOT_USER: cloudnest
      MINIO_ROOT_PASSWORD: cloudnest123
    volumes: [miniodata:/data]

  pgadmin:                     # web UI for Postgres → http://localhost:8080
    image: dpage/pgadmin4
    ports: ["8080:80"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cloudnest.dev
      PGADMIN_DEFAULT_PASSWORD: cloudnest
    volumes: [pgadmindata:/var/lib/pgadmin]
    depends_on:
      postgres:
        condition: service_healthy

  createbucket:                # one-shot bucket creation
    image: minio/mc
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "mc alias set local http://minio:9000 cloudnest cloudnest123 &&
      mc mb -p local/cloud-nest-dev || true"

volumes: { pgdata: {}, redisdata: {}, miniodata: {}, pgadmindata: {} }